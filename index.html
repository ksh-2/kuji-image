<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>가챠 스토어 이미지 추출기</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 420px;
      }
      .input-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        width: 95%;
        margin-left: auto;
        margin-right: auto;
      }
      input {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      #urlInput {
        width: 95%;
        margin-bottom: 15px;
      }
      .range-input {
        width: 45%;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        width: 95%;
        font-weight: bold;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }

      /* 📊 프로그레스 바 스타일 추가 */
      .progress-container {
        display: none; /* 기본적으로는 숨김 */
        width: 95%;
        background-color: #e0e0e0;
        border-radius: 10px;
        margin: 20px auto 10px auto;
        overflow: hidden;
      }
      .progress-bar {
        width: 0%;
        height: 12px;
        background-color: #28a745; /* 성공적인 초록색 */
        transition: width 0.4s ease; /* 부드러운 애니메이션 효과 */
      }

      #status {
        margin-top: 10px;
        color: #666;
        font-size: 14px;
        white-space: pre-line;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>이미지 추출기 (범위 다운로드)</h2>
      <p>작품 주소와 받고 싶은 번호 범위를 입력하세요.</p>

      <input
        type="text"
        id="urlInput"
        placeholder="예시: https://1kuji.com/products/myhero"
      />

      <div class="input-group">
        <input
          type="number"
          id="startNum"
          class="range-input"
          placeholder="시작 번호 (ex. 32)"
        />
        <span>~</span>
        <input
          type="number"
          id="endNum"
          class="range-input"
          placeholder="끝 번호 (ex. 44)"
        />
      </div>

      <button id="extractBtn">연속 일괄 다운로드 시작</button>

      <!-- 📊 시각적 진행 상황 창 추가 -->
      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div id="status"></div>
    </div>

    <script>
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      document
        .getElementById("extractBtn")
        .addEventListener("click", async () => {
          const baseUrlInput = document.getElementById("urlInput").value.trim();
          const startNumInput = document
            .getElementById("startNum")
            .value.trim();
          const endNumInput = document.getElementById("endNum").value.trim();
          const statusDiv = document.getElementById("status");
          const btn = document.getElementById("extractBtn");

          // 프로그레스 바 엘리먼트 가져오기
          const progressContainer =
            document.getElementById("progressContainer");
          const progressBar = document.getElementById("progressBar");

          if (!baseUrlInput || !startNumInput || !endNumInput) {
            alert("주소와 시작/끝 번호를 모두 입력해주세요!");
            return;
          }

          const startNum = parseInt(startNumInput, 10);
          const endNum = parseInt(endNumInput, 10);

          if (startNum > endNum) {
            alert("시작 번호가 끝 번호보다 클 수 없습니다!");
            return;
          }

          let baseUrl = baseUrlInput;
          if (/\/products\/[a-zA-Z_-]+\d+$/.test(baseUrl)) {
            baseUrl = baseUrl.replace(/\d+$/, "");
          }
          if (baseUrl.endsWith("/")) {
            baseUrl = baseUrl.slice(0, -1);
          }

          btn.disabled = true;

          // 📊 다운로드 시작 시 게이지 초기화 및 표시
          progressContainer.style.display = "block";
          progressBar.style.width = "0%";

          const totalCount = endNum - startNum + 1;
          let successCount = 0;

          for (let i = startNum; i <= endNum; i++) {
            const currentFilename = `${baseUrl.split("/").pop()}${i}`;
            const currentUrl = `${baseUrl}${i}`;
            const currentIndex = i - startNum + 1;

            statusDiv.textContent = `[${currentIndex}/${totalCount}] 현재 ${currentFilename} 분석 중...\n(Puppeteer 구동 중, 잠시만 기다려주세요)`;

            try {
              const response = await fetch(
                "https://kuji-image-production.up.railway.app/api/extract",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ url: currentUrl }),
                },
              );

              if (!response.ok) {
                throw new Error(`서버 에러 또는 없는 상품 번호입니다.`);
              }

              statusDiv.textContent = `[${currentIndex}/${totalCount}] ${currentFilename} 압축 완료! 다운로드 중...`;

              const blob = await response.blob();
              const downloadUrl = window.URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = downloadUrl;
              a.download = `${currentFilename}.zip`;
              document.body.appendChild(a);
              a.click();
              a.remove();
              window.URL.revokeObjectURL(downloadUrl);
            } catch (err) {
              console.error(err);
              alert(
                `${currentFilename} 추출 실패: ${err.message}\n다음 번호로 계속 진행합니다.`,
              );
            }

            // 📊 작업 하나가 끝날 때마다 프로그레스 바 게이지 채우기
            const percent = Math.round((currentIndex / totalCount) * 100);
            progressBar.style.width = `${percent}%`;

            if (i < endNum) {
              statusDiv.textContent = `진행률: ${percent}%\n서버 과부화 방지 3초간 대기 중...`;
              await delay(3000);
            }
          }

          // 최종 완료 처리
          progressBar.style.width = "100%";
          statusDiv.textContent =
            "지정한 모든 범위의 다운로드가 완료되었습니다!";
          btn.disabled = false;
        });
    </script>
  </body>
</html>
