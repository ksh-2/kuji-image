<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>가챠 스토어 이미지 추출기</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 420px;
      }
      .input-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        width: 95%;
        margin-left: auto;
        margin-right: auto;
      }
      input {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      #urlInput {
        width: 95%;
        margin-bottom: 15px;
      }
      .range-input {
        width: 45%;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        width: 95%;
        font-weight: bold;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      #status {
        margin-top: 15px;
        color: #666;
        font-size: 14px;
        white-space: pre-line; /* 줄바꿈 지원 */
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>이미지 추출기 (범위 다운로드)</h2>
      <p>작품 주소와 받고 싶은 번호 범위를 입력하세요.</p>

      <!-- 기본 URL 입력 (끝에 번호는 제외하고 입력해도 됨) -->
      <input
        type="text"
        id="urlInput"
        placeholder="예시: https://1kuji.com/products/myhero"
      />

      <!-- 범위 입력 칸 -->
      <div class="input-group">
        <input
          type="number"
          id="startNum"
          class="range-input"
          placeholder="시작 번호 (ex. 32)"
        />
        <span>~</span>
        <input
          type="number"
          id="endNum"
          class="range-input"
          placeholder="끝 번호 (ex. 44)"
        />
      </div>

      <button id="extractBtn">연속 일괄 다운로드 시작</button>
      <div id="status"></div>
    </div>

    <script>
      // 안전하게 텀을 주기 위한 대기 함수 (밀리초 단위)
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      document
        .getElementById("extractBtn")
        .addEventListener("click", async () => {
          const baseUrlInput = document.getElementById("urlInput").value.trim();
          const startNumInput = document
            .getElementById("startNum")
            .value.trim();
          const endNumInput = document.getElementById("endNum").value.trim();
          const statusDiv = document.getElementById("status");
          const btn = document.getElementById("extractBtn");

          if (!baseUrlInput || !startNumInput || !endNumInput) {
            alert("주소와 시작/끝 번호를 모두 입력해주세요!");
            return;
          }

          const startNum = parseInt(startNumInput, 10);
          const endNum = parseInt(endNumInput, 10);

          if (startNum > endNum) {
            alert("시작 번호가 끝 번호보다 클 수 없습니다!");
            return;
          }

          // 기본 URL 베이스 다듬기 (끝에 숫자가 붙어있다면 제거해서 베이스만 남김)
          // 예: myhero43 -> myhero 로 정규식을 통해 뒤쪽 숫자 제거
          let baseUrl = baseUrlInput;
          if (/\/products\/[a-zA-Z_-]+\d+$/.test(baseUrl)) {
            baseUrl = baseUrl.replace(/\d+$/, "");
          }
          // 끝에 /가 붙어있다면 제거
          if (baseUrl.endsWith("/")) {
            baseUrl = baseUrl.slice(0, -1);
          }

          btn.disabled = true;
          const totalCount = endNum - startNum + 1;

          // 범위만큼 반복문 돌리기
          for (let i = startNum; i <= endNum; i++) {
            const currentFilename = `${baseUrl.split("/").pop()}${i}`; // 예: myhero32
            const currentUrl = `${baseUrl}${i}`; // 완성된 주소: https://1kuji.com/products/myhero32

            statusDiv.textContent = `[${i - startNum + 1}/${totalCount}] 현재 ${currentFilename} 분석 중...\n(Puppeteer 구동 중, 잠시만 기다려주세요)`;

            try {
              const response = await fetch(
                "https://kuji-image-production.up.railway.app/api/extract",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ url: currentUrl }),
                },
              );

              if (!response.ok) {
                throw new Error(`서버 에러 또는 없는 상품 번호입니다.`);
              }

              statusDiv.textContent = `[${i - startNum + 1}/${totalCount}] ${currentFilename} 압축 완료! 다운로드 중...`;

              const blob = await response.blob();
              const downloadUrl = window.URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = downloadUrl;
              a.download = `${currentFilename}.zip`; // 각각 구별 가능하게 번호별 파일명 지정!
              document.body.appendChild(a);
              a.click();
              a.remove();
              window.URL.revokeObjectURL(downloadUrl);
            } catch (err) {
              console.error(err);
              // 하나가 실패해도 멈추지 않고 알림 후 다음 번호로 넘어가도록 처리
              alert(
                `${currentFilename} 추출 실패: ${err.message}\n다음 번호로 계속 진행합니다.`,
              );
            }

            // 💡 중요: 1kuji 사이트 및 Railway 서버 과부하 방지를 위해
            // 하나의 다운로드가 끝날 때마다 3초씩 쉬어줍니다.
            if (i < endNum) {
              statusDiv.textContent = `안전한 진행을 위해 3초간 대기 중...`;
              await delay(3000);
            }
          }

          statusDiv.textContent =
            "🎉 지정한 모든 범위의 다운로드가 완료되었습니다!";
          btn.disabled = false;
        });
    </script>
  </body>
</html>
