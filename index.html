<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>가챠 스토어 이미지 추출기</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 420px;
      }
      .input-group {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        width: 95%;
        margin-left: auto;
        margin-right: auto;
      }
      input {
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      #urlInput {
        width: 95%;
        margin-bottom: 15px;
      }
      .range-input {
        width: 45%;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        width: 95%;
        font-weight: bold;
      }
      button:hover {
        background-color: #0056b3;
      }
      button:disabled {
        background-color: #ccc;
        cursor: not-allowed;
      }
      .progress-container {
        display: none;
        width: 95%;
        background-color: #e0e0e0;
        border-radius: 10px;
        margin: 20px auto 10px auto;
        overflow: hidden;
      }
      .progress-bar {
        width: 0%;
        height: 12px;
        background-color: #28a745;
        transition: width 0.4s ease;
      }
      #status {
        margin-top: 10px;
        color: #666;
        font-size: 14px;
        white-space: pre-line;
        line-height: 1.5;
        text-align: left;
        padding: 0 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2 style="text-align: center">이미지 추출기 (한글 자동 번역)</h2>
      <p style="text-align: center">
        작품 주소와 받고 싶은 번호 범위를 입력하세요.
      </p>

      <input
        type="text"
        id="urlInput"
        placeholder="예시: https://1kuji.com/products/kimetsu"
      />

      <div class="input-group">
        <input
          type="number"
          id="startNum"
          class="range-input"
          placeholder="시작 번호 (ex. 28)"
        />
        <span>~</span>
        <input
          type="number"
          id="endNum"
          class="range-input"
          placeholder="끝 번호 (ex. 30)"
        />
      </div>

      <button id="extractBtn">연속 일괄 다운로드 시작</button>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div id="status"></div>
    </div>

    <script>
      const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      document
        .getElementById("extractBtn")
        .addEventListener("click", async () => {
          const baseUrlInput = document.getElementById("urlInput").value.trim();
          const startNumInput = document
            .getElementById("startNum")
            .value.trim();
          const endNumInput = document.getElementById("endNum").value.trim();
          const statusDiv = document.getElementById("status");
          const btn = document.getElementById("extractBtn");

          const progressContainer =
            document.getElementById("progressContainer");
          const progressBar = document.getElementById("progressBar");

          if (!baseUrlInput || !startNumInput || !endNumInput) {
            alert("주소와 시작/끝 번호를 모두 입력해주세요!");
            return;
          }

          const startNum = parseInt(startNumInput, 10);
          const endNum = parseInt(endNumInput, 10);

          if (startNum > endNum) {
            alert("시작 번호가 끝 번호보다 클 수 없습니다!");
            return;
          }

          let baseUrl = baseUrlInput;
          if (/\/products\/[a-zA-Z_-]+\d+$/.test(baseUrl)) {
            baseUrl = baseUrl.replace(/\d+$/, "");
          }
          if (baseUrl.endsWith("/")) {
            baseUrl = baseUrl.slice(0, -1);
          }

          btn.disabled = true;
          progressContainer.style.display = "block";
          progressBar.style.width = "0%";
          statusDiv.innerHTML = "";

          const totalCount = endNum - startNum + 1;
          let errorsLog = [];

          for (let i = startNum; i <= endNum; i++) {
            const currentCode = `${baseUrl.split("/").pop()}${i}`;
            const currentUrl = `${baseUrl}${i}`;
            const currentIndex = i - startNum + 1;

            statusDiv.innerHTML = `⏳ <b>[${currentIndex}/${totalCount}]</b> 현재 <code>${currentCode}</code> 추출 및 자동 번역 진행 중...`;

            try {
              const response = await fetch(
                "https://kuji-image-production.up.railway.app/api/extract",
                {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ url: currentUrl }),
                },
              );

              if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(
                  errData.error || `서버 에러 (${response.status})`,
                );
              }

              const encodedTitle = response.headers.get("X-Kuji-Title");
              let downloadFilename = encodedTitle
                ? decodeURIComponent(encodedTitle)
                : currentCode;

              // 특수문자 정제
              downloadFilename = downloadFilename.replace(
                /[\x00-\x1f\x7f\\/:*?"<>|]/g,
                "_",
              );

              if (!downloadFilename.trim()) {
                downloadFilename = currentCode;
              }

              statusDiv.innerHTML = `✅ <b>[${currentIndex}/${totalCount}]</b> 압축 성공!<br>📦 파일명: <code>${downloadFilename}.zip</code>`;

              const blob = await response.blob();
              const downloadUrl = window.URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = downloadUrl;
              a.download = `${downloadFilename}.zip`;
              document.body.appendChild(a);
              a.click();
              a.remove();
              window.URL.revokeObjectURL(downloadUrl);
            } catch (err) {
              console.error(err);
              errorsLog.push(`❌ <b>${currentCode}번 실패:</b> ${err.message}`);
            }

            const percent = Math.round((currentIndex / totalCount) * 100);
            progressBar.style.width = `${percent}%`;

            if (i < endNum) {
              await delay(3000); // 3초 휴식
            }
          }

          progressBar.style.width = "100%";

          if (errorsLog.length > 0) {
            statusDiv.innerHTML =
              `<span style="color:red; font-weight:bold;">⚠️ 다운로드 종료 (일부 실패 항목 발생)</span><br>` +
              errorsLog.join("<br>");
          } else {
            statusDiv.innerHTML =
              "<b>지정한 모든 범위의 다운로드가 완료되었습니다!<b>";
          }

          btn.disabled = false;
        });
    </script>
  </body>
</html>
