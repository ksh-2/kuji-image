<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>이미지 추출기</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background-color: #f5f5f5;
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        text-align: center;
        width: 400px;
      }
      input {
        width: 90%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        width: 95%;
      }
      button:hover {
        background-color: #0056b3;
      }
      #status {
        margin-top: 15px;
        color: #666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>이미지 추출기</h2>
      <p>링크를 입력하면 피규어 이미지를 ZIP으로 압축해 다운로드합니다.</p>
      <input
        type="text"
        id="urlInput"
        placeholder="https://1kuji.com/products/..."
      />
      <button id="extractBtn">이미지 일괄 다운로드</button>
      <div id="status"></div>
    </div>

    <script>
      document
        .getElementById("extractBtn")
        .addEventListener("click", async () => {
          const url = document.getElementById("urlInput").value.trim();
          const statusDiv = document.getElementById("status");

          if (!url) {
            alert("URL을 입력해주세요!");
            return;
          }

          statusDiv.textContent =
            "Puppeteer가 사이트를 분석하는 중... (약 10~15초 소요)";

          try {
            // 💡 여기 주소를 localhost에서 배포된 Railway 실서버 주소로 변경했습니다!
            const response = await fetch(
              "https://kuji-image-production.up.railway.app/api/extract",
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url }),
              },
            );

            if (!response.ok) {
              const errData = await response.json();
              throw new Error(errData.error || "다운로드 실패");
            }

            statusDiv.textContent = "이미지 다운로드 및 압축 완료! 저장 중...";

            // 💡 URL의 맨 마지막 / 뒷부분(예: myhero43)을 추출합니다.
            const urlParts = url.split("/").filter((part) => part.length > 0);
            const filename =
              urlParts.length > 0
                ? urlParts[urlParts.length - 1]
                : "ichibankuji";

            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = downloadUrl;

            // 💡 추출한 상품 코드로 파일명 지정 (예: myhero43.zip)
            a.download = `${filename}.zip`;

            document.body.appendChild(a);
            a.click();
            a.remove();
            window.URL.revokeObjectURL(downloadUrl);

            statusDiv.textContent = "다운로드 완료!";
          } catch (err) {
            statusDiv.textContent = `에러 발생: ${err.message}`;
          }
        });
    </script>
  </body>
</html>
